<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel Pizzaria</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🍕 Painel da Pizzaria</h1>

    <div class="container">

        <div class="card">
            <h2>💰 Faturamento</h2>
            <p id="faturamento">Carregando...</p>
        </div>

        <div class="card">
            <h2>🍕 Mais Vendidas</h2>
            <ul id="maisVendidas"></ul>
        </div>

        <div class="card">
            <h2>📋 Pedidos</h2>
            <ul id="pedidos"></ul>
        </div>

    </div>

    <h2>📅 Filtrar por data</h2>
    <input type="date" id="dataFiltro">
    <button onclick="filtrar()">Filtrar</button>

    <p id="faturamentoData"></p>

    <h2>🛒 Novo Pedido</h2>

<input type="text" id="pizza" placeholder="Pizza (ex: calabresa)">
<input type="number" id="quantidade" placeholder="Quantidade">

<button onclick="criarPedido()">Criar Pedido</button>

    <script src="script.js"></script>

</body>

</html>
